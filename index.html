<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKKO DIGITAL | Premium Electronics Flat Rs. 999.00</title>
    <script>
    window.onerror = function(message, source, lineno, colno, error) {
        const show = () => {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = 'red';
            div.style.color = 'white';
            div.style.padding = '20px';
            div.style.zIndex = '99999';
            div.style.fontFamily = 'monospace';
            div.innerHTML = '<strong>JS Error:</strong> ' + message + ' at ' + source + ':' + lineno + ':' + colno;
            document.body.appendChild(div);
        };
        if (document.body) {
            show();
        } else {
            window.addEventListener('DOMContentLoaded', show);
        }
        return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
        const show = () => {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.background = 'orange';
            div.style.color = 'black';
            div.style.padding = '20px';
            div.style.zIndex = '99999';
            div.style.fontFamily = 'monospace';
            div.innerHTML = '<strong>Unhandled Rejection:</strong> ' + (event.reason ? event.reason.message || event.reason : 'Unknown reason');
            document.body.appendChild(div);
        };
        if (document.body) {
            show();
        } else {
            window.addEventListener('DOMContentLoaded', show);
        }
    });
    </script>
    <link rel="stylesheet" href="style.css?v=2.4">
</head>
<body>

    <!-- Header will be rendered here by app-core.js?v=11.0 -->
    <div id="header-placeholder"></div>

    <!-- Hero Banner Section -->
    <section class="hero-banner">
        <div class="hero-container">
            <h1>Up to 90% Off</h1>
            <p>Stunning Essentials for the Journey. Grab now!</p>
            <a href="#store-listings" class="hero-btn" onclick="scrollToProducts(event)">SHOP NOW</a>
        </div>
    </section>

    <!-- Category Filter Tabs -->
    <div class="tabs-container" id="store-listings">
        <button class="tab-btn active" id="tab-all" onclick="filterTab('all')">All Products</button>
        <button class="tab-btn" id="tab-tablets" onclick="filterTab('tablets')">iPads & Tablets</button>
        <button class="tab-btn" id="tab-smart-phone" onclick="filterTab('smart-phone')">Smart Phones</button>
        <button class="tab-btn" id="tab-audio" onclick="filterTab('audio')">Audio & Earbuds</button>
    </div>

    <!-- Products Grid Section -->
    <main class="storefront-section">
        <div class="products-grid" id="products-grid-container">
            <!-- Products will be dynamically populated here -->
        </div>
    </main>

    <!-- Footer will be rendered here by app-core.js?v=11.0 -->
    <div id="footer-placeholder"></div>

    <!-- Core Scripts -->
    <script src="app-core.js?v=11.0"></script>
    <script>
        let currentTab = 'all';

        function scrollToProducts(e) {
            e.preventDefault();
            document.getElementById('store-listings').scrollIntoView({ behavior: 'smooth' });
        }

        // Categorize helper
        function getProductCategory(product) {
            if (product.category) return product.category;
            const title = product.title.toLowerCase();
            if (title.includes('ipad') || title.includes('tab')) {
                return 'tablets';
            }
            if (title.includes('airdopes') || title.includes('ufo') || title.includes('earbuds') || title.includes('audio') || title.includes('tws')) {
                return 'audio';
            }
            if (title.includes('smartphone') || title.includes('phone') || product.id === '8270415000010') {
                return 'smart-phone';
            }
            return 'gadgets';
        }

        function filterTab(category) {
            currentTab = category;
            
            // Update Tab UI
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (category === 'all') document.getElementById('tab-all').classList.add('active');
            if (category === 'tablets') document.getElementById('tab-tablets').classList.add('active');
            if (category === 'audio') document.getElementById('tab-audio').classList.add('active');
            if (category === 'smart-phone') document.getElementById('tab-smart-phone').classList.add('active');

            renderStorefront();
        }

        async function renderStorefront() {
            const grid = document.getElementById('products-grid-container');
            if (!grid) return;

            const products = await getProducts();
            
            // Filter products
            let filteredProducts = products;
            if (currentTab !== 'all') {
                filteredProducts = products.filter(p => getProductCategory(p) === currentTab);
            }

            if (filteredProducts.length === 0) {
                grid.innerHTML = '<div class="no-products-msg">No products found in this category.</div>';
                return;
            }

            grid.innerHTML = filteredProducts.map(p => {
                // Compute saved percentage
                const priceNum = parsePrice(p.price) || 999;
                const compareNum = parsePrice(p.comparePrice) || 59900;
                const percentSaved = Math.round(((compareNum - priceNum) / compareNum) * 100);

                let badgeHtml = '';
                if (p.stockStatus === 'out-of-stock') {
                    badgeHtml = `<span class="card-badge-soldout">Sold Out</span>`;
                } else if (p.badge) {
                    badgeHtml = `<span class="card-badge-sale">${p.badge}</span>`;
                } else {
                    badgeHtml = `<span class="card-badge-sale">Save ${percentSaved}%</span>`;
                }

                const buttonHtml = p.stockStatus === 'out-of-stock'
                    ? `<button class="add-to-cart-btn" disabled>Sold Out</button>`
                    : `<button class="add-to-cart-btn" onclick="addToCart('${p.id}')">Add to Cart</button>`;

                return `
                    <article class="product-card" id="card-${p.id}">
                        ${badgeHtml}
                        <a href="product.html?id=${p.id}" class="product-card-img-wrapper">
                            <img src="${p.image}" alt="${p.title}" loading="lazy">
                        </a>
                        <div class="product-card-info">
                            <div class="product-card-prices">
                                <span class="product-card-sale-price">${p.price}</span>
                                <span class="product-card-compare-price">${p.comparePrice}</span>
                            </div>
                            <h2 class="product-card-title">
                                <a href="product.html?id=${p.id}">${p.title}</a>
                            </h2>
                            <div class="product-card-actions">
                                ${buttonHtml}
                                <a href="product.html?id=${p.id}" class="view-details-btn" title="View Specifications">
                                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                                </a>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Handle load and tab selections from URL parameters
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tab = urlParams.get('tab');
            if (tab && ['all', 'tablets', 'audio', 'smart-phone'].includes(tab)) {
                filterTab(tab);
            } else {
                renderStorefront();
            }
        });
        window.addEventListener('products-synced', () => {
            renderStorefront();
        });
    </script>
</body>
</html>
